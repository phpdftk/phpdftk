name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.4']

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Initialize corpus submodules
        run: git submodule update --init --depth 1 vendor-data/poppler-test vendor-data/qpdf vendor-data/verapdf-corpus vendor-data/pdf20examples vendor-data/pdfium vendor-data/pdfbox vendor-data/arlington-pdf-model vendor-data/html5lib-tests

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zlib, openssl, simplexml, intl
          coverage: none

      - name: Install system fonts and ICC profiles
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-liberation fonts-dejavu-core fonts-stix fonts-noto-color-emoji fonts-noto-core icc-profiles-free

      - name: Build validation tool images
        run: cd docker && docker compose build

      - name: Pull veraPDF image
        run: docker pull verapdf/cli

      - name: Pull JHOVE image
        run: docker pull openpreserve/jhove

      - name: Build pdfid and PDFBox Preflight images
        run: cd docker && docker compose build pdfid pdfbox-preflight

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: php -d memory_limit=512M vendor/bin/phpunit --no-coverage

      - name: Run static analysis
        run: composer analyse

      - name: Run lint
        run: composer lint

      - name: Audit dependencies
        run: composer audit --abandoned=report

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Initialize corpus submodules
        run: git submodule update --init --depth 1 vendor-data/poppler-test vendor-data/qpdf vendor-data/verapdf-corpus vendor-data/pdf20examples vendor-data/pdfium vendor-data/pdfbox vendor-data/arlington-pdf-model vendor-data/html5lib-tests

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml, intl
          coverage: pcov

      - name: Install system fonts and ICC profiles
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-liberation fonts-dejavu-core fonts-stix fonts-noto-color-emoji fonts-noto-core icc-profiles-free

      - name: Build validation tool images
        run: cd docker && docker compose build

      - name: Pull veraPDF image
        run: docker pull verapdf/cli

      - name: Pull JHOVE image
        run: docker pull openpreserve/jhove

      - name: Build pdfid and PDFBox Preflight images
        run: cd docker && docker compose build pdfid pdfbox-preflight

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests with coverage
        # No memory cap: PCOV instrumentation plus the HTML report
        # renderer scale with the (growing) codebase and exceeded the
        # 512M used elsewhere — the report-generation step OOM'd while
        # the test run itself passed. This is the report job, not the
        # correctness gate (`test` above runs `--no-coverage`).
        run: |
          mkdir -p build/coverage
          php -d memory_limit=-1 vendor/bin/phpunit \
            --coverage-clover build/coverage/clover.xml \
            --coverage-html build/coverage/html

      - name: Upload coverage artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: build/coverage/

  publish-coverage:
    needs: coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: simplexml

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: build/coverage/

      - name: Generate badge and summary
        run: |
          COVERAGE=$(php -r '
            $xml = simplexml_load_file("build/coverage/clover.xml");
            $metrics = $xml->project->metrics;
            $statements = (int)$metrics["statements"];
            $covered = (int)$metrics["coveredstatements"];
            echo $statements > 0 ? round($covered / $statements * 100, 2) : 0;
          ')
          echo "COVERAGE=$COVERAGE" >> "$GITHUB_ENV"
          echo "Coverage: ${COVERAGE}%"

          php scripts/generate-badge.php "$COVERAGE" coverage > build/coverage/coverage-badge.svg

          cat > build/coverage/coverage.md <<EOF
          # Code Coverage Report

          **Coverage:** ${COVERAGE}%

          Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Commit: ${GITHUB_SHA}
          Ref: ${GITHUB_REF}
          EOF

          php -r '
            $xml = simplexml_load_file("build/coverage/clover.xml");
            $metrics = $xml->project->metrics;
            $statements = (int)$metrics["statements"];
            $covered = (int)$metrics["coveredstatements"];
            $methods = (int)$metrics["methods"];
            $coveredMethods = (int)$metrics["coveredmethods"];
            echo json_encode([
              "coverage" => $statements > 0 ? round($covered / $statements * 100, 2) : 0,
              "statements" => $statements,
              "covered_statements" => $covered,
              "methods" => $methods,
              "covered_methods" => $coveredMethods,
              "commit" => getenv("GITHUB_SHA"),
              "ref" => getenv("GITHUB_REF"),
              "timestamp" => date("c"),
            ], JSON_PRETTY_PRINT);
          ' > build/coverage/coverage.json

      - name: Upload coverage.json for PR aggregator
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json
          path: build/coverage/coverage.json

      - name: Determine target directory
        id: target
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            DIR="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            DIR="pr/${PR_NUMBER}/${GITHUB_SHA}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            DIR="${BRANCH}/${GITHUB_SHA}"
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Commit to _coverage branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin _coverage:refs/remotes/origin/_coverage 2>/dev/null || true

          if git rev-parse --verify origin/_coverage >/dev/null 2>&1; then
            git worktree add coverage-branch origin/_coverage
            cd coverage-branch
            git checkout -B _coverage origin/_coverage
          else
            git worktree add --detach coverage-branch
            cd coverage-branch
            git checkout --orphan _coverage
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p "${{ steps.target.outputs.dir }}"
          cp -r ../build/coverage/* "${{ steps.target.outputs.dir }}/"

          # Refresh `latest/` on every main push and tag push so consumers
          # (README badge, deployed docs site) have a stable URL. Use a real
          # directory copy rather than a symlink — raw.githubusercontent.com
          # serves symlinks as their target string, not the target file.
          if [[ "$GITHUB_REF" == refs/heads/main || "$GITHUB_REF" == refs/tags/* ]]; then
            rm -rf latest
            mkdir -p latest
            cp -r ../build/coverage/* latest/
          fi

          git add .
          git commit -m "coverage: ${{ steps.target.outputs.dir }}" --allow-empty
          # Concurrent PR runs race on the shared _coverage branch; each
          # writes its own pr/<num>/<sha>/ path, so retry with a rebase
          # onto the latest tip (same pattern as the _phpdoc push).
          for attempt in 1 2 3 4 5; do
            git push origin _coverage && break
            echo "push rejected (attempt $attempt) — re-syncing _coverage and retrying"
            git pull --rebase origin _coverage
          done

      - name: Cleanup worktree
        if: always()
        run: git worktree remove coverage-branch --force 2>/dev/null || true

  phpdoc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml

      - name: Install phpDocumentor
        run: |
          curl -sSL https://github.com/phpDocumentor/phpDocumentor/releases/download/v3.9.1/phpDocumentor.phar -o phpDocumentor.phar
          chmod +x phpDocumentor.phar
          sudo mv phpDocumentor.phar /usr/local/bin/phpdoc

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate API docs (combined + per-package)
        run: composer phpdoc -- --all

      - name: Upload phpdoc artifacts
        uses: actions/upload-artifact@v7
        with:
          name: phpdoc
          path: build/phpdoc/

      - name: Determine target directory
        id: target
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            DIR="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            DIR="pr/${PR_NUMBER}/${GITHUB_SHA}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            DIR="${BRANCH}/${GITHUB_SHA}"
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Commit to _phpdoc branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin _phpdoc:refs/remotes/origin/_phpdoc 2>/dev/null || true

          if git rev-parse --verify origin/_phpdoc >/dev/null 2>&1; then
            git worktree add phpdoc-branch origin/_phpdoc
            cd phpdoc-branch
            git checkout -B _phpdoc origin/_phpdoc
          else
            git worktree add --detach phpdoc-branch
            cd phpdoc-branch
            git checkout --orphan _phpdoc
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p "${{ steps.target.outputs.dir }}"
          cp -r ../build/phpdoc/* "${{ steps.target.outputs.dir }}/"

          for pkg_dir in ../build/phpdoc-packages/*/; do
            [ -d "$pkg_dir" ] || continue
            [ -n "$(ls -A "$pkg_dir" 2>/dev/null)" ] || continue
            pkg_name=$(basename "$pkg_dir")
            mkdir -p "packages/$pkg_name/${{ steps.target.outputs.dir }}"
            cp -r "$pkg_dir." "packages/$pkg_name/${{ steps.target.outputs.dir }}/"
          done

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            rm -f latest
            ln -s "${{ steps.target.outputs.dir }}" latest
            for pkg_dir in packages/*/; do
              rm -f "${pkg_dir}latest"
              ln -s "${{ steps.target.outputs.dir }}" "${pkg_dir}latest"
            done
          fi

          git add .
          git commit -m "phpdoc: ${{ steps.target.outputs.dir }}" --allow-empty
          # Concurrent PR runs all push to the shared _phpdoc branch and
          # race; each writes to its own pr/<num>/<sha>/ path, so a
          # rejected push just needs a rebase onto the latest tip and a
          # retry (no real conflicts). Without this, simultaneous PRs
          # fail with "! [rejected] (fetch first)".
          for attempt in 1 2 3 4 5; do
            git push origin _phpdoc && break
            echo "push rejected (attempt $attempt) — re-syncing _phpdoc and retrying"
            git pull --rebase origin _phpdoc
          done

      - name: Cleanup worktree
        if: always()
        run: git worktree remove phpdoc-branch --force 2>/dev/null || true


  compliance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Initialize corpus submodules
        run: git submodule update --init --depth 1 vendor-data/poppler-test vendor-data/qpdf vendor-data/verapdf-corpus vendor-data/pdf20examples vendor-data/pdfium vendor-data/pdfbox vendor-data/html5lib-tests

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml
          coverage: none

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build QPDF image
        run: cd docker && docker compose build

      - name: Pull veraPDF image
        run: docker pull verapdf/cli

      - name: Pull JHOVE image
        run: docker pull openpreserve/jhove

      - name: Build pdfid and PDFBox Preflight images
        run: cd docker && docker compose build pdfid pdfbox-preflight

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate compliance report
        run: composer compliance

      - name: Upload compliance report
        # Always upload so the PR-report aggregator can render the comment
        # even when the compliance gate (parse-compliance.php) failed the job.
        if: always() && hashFiles('docs/generated/compliance.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: compliance-report
          path: |
            docs/generated/compliance.md
            docs/generated/compliance.json

      - name: Publish to _compliance branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin _compliance:refs/remotes/origin/_compliance 2>/dev/null || true

          if git rev-parse --verify origin/_compliance >/dev/null 2>&1; then
            git worktree add compliance-branch origin/_compliance
            cd compliance-branch
            git checkout -B _compliance origin/_compliance
          else
            git worktree add --detach compliance-branch
            cd compliance-branch
            git checkout --orphan _compliance
            git rm -rf . 2>/dev/null || true
          fi

          DIR="${GITHUB_REF#refs/heads/}/${GITHUB_SHA}"
          mkdir -p "$DIR"
          cp ../docs/generated/compliance.md "$DIR/compliance.md"
          cp ../docs/generated/compliance.json "$DIR/compliance.json"

          # `latest/` always points at the most recent main run so consumers
          # (the docs site, the PR-report aggregator) have a stable URL.
          mkdir -p latest
          cp ../docs/generated/compliance.md latest/compliance.md
          cp ../docs/generated/compliance.json latest/compliance.json

          git add .
          git commit -m "compliance: $DIR" --allow-empty
          git push origin _compliance

      - name: Cleanup worktree
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git worktree remove compliance-branch --force 2>/dev/null || true

  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml, intl
          coverage: none

      - name: Install system fonts and ICC profiles
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-liberation fonts-dejavu-core fonts-stix fonts-noto-color-emoji fonts-noto-core icc-profiles-free

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run benchmarks
        run: composer benchmark

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            docs/generated/benchmarks.md
            docs/generated/benchmarks.json

      - name: Publish to _benchmarks branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin _benchmarks:refs/remotes/origin/_benchmarks 2>/dev/null || true

          if git rev-parse --verify origin/_benchmarks >/dev/null 2>&1; then
            git worktree add benchmarks-branch origin/_benchmarks
            cd benchmarks-branch
            git checkout -B _benchmarks origin/_benchmarks
          else
            git worktree add --detach benchmarks-branch
            cd benchmarks-branch
            git checkout --orphan _benchmarks
            git rm -rf . 2>/dev/null || true
          fi

          DIR="${GITHUB_REF#refs/heads/}/${GITHUB_SHA}"
          mkdir -p "$DIR"
          cp ../docs/generated/benchmarks.md "$DIR/benchmarks.md"
          cp ../docs/generated/benchmarks.json "$DIR/benchmarks.json"

          # `latest/` always points at the most recent main run so the docs
          # site and the PR-report aggregator have a stable URL.
          mkdir -p latest
          cp ../docs/generated/benchmarks.md latest/benchmarks.md
          cp ../docs/generated/benchmarks.json latest/benchmarks.json

          git add .
          git commit -m "benchmarks: $DIR" --allow-empty
          git push origin _benchmarks

      - name: Cleanup worktree
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git worktree remove benchmarks-branch --force 2>/dev/null || true

  pr-report:
    runs-on: ubuntu-latest
    needs: [publish-coverage, compliance, benchmarks]
    # `always()` so the comment posts (and gates) even if compliance/benchmarks
    # exited non-zero — the comment is the user-facing signal.
    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: simplexml

      - name: Download current artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Fetch main baselines
        run: |
          mkdir -p baselines
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/_coverage/latest/coverage.json"     -o baselines/coverage.json     || echo "no coverage baseline"
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/_benchmarks/latest/benchmarks.json" -o baselines/benchmarks.json   || echo "no benchmarks baseline"
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/_compliance/latest/compliance.json" -o baselines/compliance.json   || echo "no compliance baseline"

      - name: Build PR comment body
        run: |
          php scripts/build-pr-comment.php \
            --coverage-current=artifacts/coverage-json/coverage.json \
            --coverage-baseline=baselines/coverage.json \
            --benchmarks-current=artifacts/benchmark-report/benchmarks.json \
            --benchmarks-baseline=baselines/benchmarks.json \
            --compliance-current=artifacts/compliance-report/compliance.json \
            --compliance-baseline=baselines/compliance.json \
            --commit-sha=${{ github.sha }} \
            --pr-number=${{ github.event.pull_request.number }} \
            --repo=${{ github.repository }} \
            --coverage-fail-threshold=1.0 \
            --benchmark-fail-threshold=15.0 \
            --verdict-output=verdict.json \
            > body.md
          echo "----- BEGIN COMMENT BODY -----"
          cat body.md
          echo "----- END COMMENT BODY -----"
          echo "----- VERDICT -----"
          cat verdict.json

      - name: Post or update PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('body.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- pr-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Enforce gate thresholds
        # Runs after the comment posts so the verdict is visible to reviewers
        # before the check goes red.
        run: |
          if jq -e '.overall_failed == true' verdict.json > /dev/null; then
            echo "::error::PR-report gate breached — see comment body for details."
            jq . verdict.json
            exit 1
          fi
          echo "PR-report gate: pass."

  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Validate package composer.json files
        run: |
          for f in packages/*/composer.json packages/pdf/*/composer.json; do
            echo "Validating $f..."
            composer validate --strict --no-check-all --no-check-lock "$f"
          done

  docs:
    needs: [coverage, phpdoc]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: build/coverage/

      - name: Download phpdoc artifacts
        uses: actions/download-artifact@v8
        with:
          name: phpdoc
          path: build/phpdoc/

      - name: Copy coverage to docs site
        run: cp -r build/coverage/html docs/site/public/coverage

      - name: Copy API docs to docs site
        run: cp -r build/phpdoc docs/site/public/api

      - name: Embed latest compliance report
        run: |
          # Pull latest/compliance.md from the _compliance branch (populated
          # by the compliance job on every main push). On tag deploys this
          # surfaces the most recent main-branch report — there's no
          # per-tag compliance run today, so the same report rides along.
          # If _compliance hasn't been created yet (first run), skip silently.
          if git fetch origin _compliance:refs/remotes/origin/_compliance 2>/dev/null \
             && git show "origin/_compliance:latest/compliance.md" > /tmp/compliance.md 2>/dev/null; then
            {
              echo '---'
              echo 'title: Latest Compliance Report'
              echo 'description: Auto-generated test results from QPDF, veraPDF, Arlington, Matterhorn, and JHOVE.'
              echo '---'
              echo
              # Drop the generated file's H1 — Starlight renders the title from frontmatter.
              tail -n +2 /tmp/compliance.md
            } > docs/site/src/content/docs/standards/validation/report.md
            echo "Embedded compliance report ($(wc -l < /tmp/compliance.md) lines)"
          else
            echo "No _compliance branch yet — skipping report embed"
          fi

      - name: Embed latest benchmarks
        run: |
          # Same pattern as the compliance embed: pull latest/benchmarks.md
          # from the _benchmarks branch (populated on every main push) and
          # render it as a Starlight page. Skip silently on first run.
          if git fetch origin _benchmarks:refs/remotes/origin/_benchmarks 2>/dev/null \
             && git show "origin/_benchmarks:latest/benchmarks.md" > /tmp/benchmarks.md 2>/dev/null; then
            {
              echo '---'
              echo 'title: Latest Benchmarks'
              echo 'description: Auto-generated benchmark results vs. TCPDF, FPDF, mPDF, Dompdf, smalot/pdfparser, and setasign/fpdi.'
              echo '---'
              echo
              tail -n +2 /tmp/benchmarks.md
            } > docs/site/src/content/docs/standards/performance/benchmarks.md
            echo "Embedded benchmarks ($(wc -l < /tmp/benchmarks.md) lines)"
          else
            echo "No _benchmarks branch yet — skipping benchmarks embed"
          fi

      - name: Setup PHP for example scripts
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate sample PDFs
        run: composer examples

      - name: Install site dependencies
        run: cd docs/site && npm ci

      - name: Generate versions.json
        run: node docs/site/scripts/generate-versions.js > docs/site/public/versions.json

      - name: Determine ref and stability
        id: ref
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            REF_NAME="${GITHUB_REF#refs/tags/}"
          else
            REF_NAME="head"
          fi
          case "$REF_NAME" in
            v*-*) IS_STABLE=0 ;;
            v*)   IS_STABLE=1 ;;
            *)    IS_STABLE=0 ;;
          esac
          echo "name=$REF_NAME"        >> "$GITHUB_OUTPUT"
          echo "stable=$IS_STABLE"     >> "$GITHUB_OUTPUT"
          echo "Building ref '$REF_NAME' (stable=$IS_STABLE)"

      - name: Build site
        env:
          DOCS_VERSION: ${{ steps.ref.outputs.name }}
          DOCS_BASE: /${{ steps.ref.outputs.name }}/
        run: cd docs/site && npx astro build --base="/${{ steps.ref.outputs.name }}/"

      - name: Publish build to _docs branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin _docs:refs/remotes/origin/_docs 2>/dev/null || true

          if git rev-parse --verify origin/_docs >/dev/null 2>&1; then
            git worktree add docs-branch origin/_docs
            cd docs-branch
            git checkout -B _docs origin/_docs
          else
            git worktree add --detach docs-branch
            cd docs-branch
            git checkout --orphan _docs
            git rm -rf . 2>/dev/null || true
          fi

          REF_NAME="${{ steps.ref.outputs.name }}"
          rm -rf "$REF_NAME"
          mkdir -p "$REF_NAME"
          cp -r ../docs/site/dist/. "$REF_NAME/"

          write_root_redirect() {
            local target="$1"
            cat > index.html <<EOF
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Redirecting…</title>
          <meta http-equiv="refresh" content="0; url=$target">
          <link rel="canonical" href="$target">
          <script>location.replace("$target");</script>
          <p>Redirecting to <a href="$target">$target</a>…</p>
          EOF
          }

          if [[ "${{ steps.ref.outputs.stable }}" == "1" ]]; then
            # Stable tags claim /latest/ and the bare root.
            mkdir -p latest
            write_root_redirect "/$REF_NAME/"
            cp index.html latest/index.html
          elif [[ ! -f index.html ]]; then
            # No stable tag has ever published a root redirect yet; point
            # the bare root at /head/ so visitors landing on phpdftk.dev
            # see the latest main-branch docs instead of a 404.
            write_root_redirect "/head/"
          fi

          git add .
          git commit -m "docs: $REF_NAME" --allow-empty
          git push origin _docs

      - name: Upload aggregated _docs tree as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-branch

      - name: Cleanup worktree
        if: always()
        run: git worktree remove docs-branch --force 2>/dev/null || true

  deploy-docs:
    needs: docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
