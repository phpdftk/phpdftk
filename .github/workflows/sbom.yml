name: SBOM

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate CycloneDX SBOM
        run: |
          composer require --dev cyclonedx/cyclonedx-php-composer --no-interaction
          vendor/bin/cyclonedx-php-composer --output-file=sbom.json --spec-version=1.5

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" sbom.json --clobber
