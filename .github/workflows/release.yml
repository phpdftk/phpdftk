name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  provenance:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate CycloneDX SBOM
        run: |
          composer require --dev cyclonedx/cyclonedx-php-composer --no-interaction
          vendor/bin/cyclonedx-php-composer --output-file=sbom.json --spec-version=1.5

      - name: Create source archive
        run: git archive --format=tar.gz --prefix=phpdftk/ -o phpdftk-source.tar.gz HEAD

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.json

      - name: Attest source archive provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: phpdftk-source.tar.gz

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$tag" sbom.json --clobber
          gh release upload "$tag" phpdftk-source.tar.gz --clobber

