name: Cross-browser oracle

# The cross-browser PDF oracle (docs/plans/cross-browser-oracle.md)
# renders the curated subset through ours + Chromium + Firefox and
# scores each fixture by consensus. It's informational — not a merge
# gate — and runs:
#
#   - Nightly via cron, so drift surfaces within 24 h.
#   - On manual dispatch with a configurable fixture filter.
#   - On every PR that touches the renderer (`packages/html-to-pdf/**`)
#     or the CSS engine (`packages/css/**`). The oracle posts / updates
#     a PR comment with a top-K regression table; it never fails the
#     check.
#
# WebKit consensus is macOS-only (Phase A3 finding). Linux runners see
# two engines (Chromium + Firefox); the ConsensusScorer treats that
# as "the two must agree". A follow-on workflow can add a single
# macos-latest job for WebKit once the layout-viewport asymmetry is
# resolved (Phase B limitations).

on:
  schedule:
    # 04:30 UTC nightly — runs on the day's main HEAD.
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      filter:
        description: 'fnmatch glob to limit fixtures (default: all curated)'
        required: false
        default: ''
      shards:
        description: 'Number of parallel shards (default 4)'
        required: false
        default: '4'
  pull_request:
    branches: [main]
    paths:
      - 'packages/html-to-pdf/**'
      - 'packages/css/**'
      - 'packages/wpt-harness/**'
      - 'scripts/cross-browser/**'
      - '.github/workflows/cross-browser.yml'

permissions:
  contents: read
  pull-requests: write

env:
  # Bump in lockstep with scripts/cross-browser/Dockerfile + BrowserOracle::$cacheGeneration.
  CACHE_GENERATION: pw-1.49.1-ff-latest-wk-26.0

jobs:
  shard:
    # 4 parallel shards by default; override via workflow_dispatch input.
    # `fromJson` on the matrix expression lets us flex shard count
    # dynamically without rewriting the matrix block.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml, intl
          coverage: none

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install system fonts and ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            fonts-liberation fonts-dejavu-core fonts-noto-core \
            imagemagick ghostscript

      - name: Install geckodriver
        # Used by scripts/cross-browser/render.mjs's WebDriver Print
        # path on macOS. Not on the critical path for this Linux
        # workflow today (the Firefox-via-Docker fallback handles
        # Linux), but installing it here keeps the dev / CI host
        # surface area consistent with what
        # scripts/bootstrap-cross-browser.sh provisions.
        run: |
          set -eux
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  GECKO_OS=linux64 ;;
            aarch64) GECKO_OS=linux-aarch64 ;;
            *) echo "unsupported arch $ARCH" >&2; exit 1 ;;
          esac
          GECKO_VER=v0.37.0
          curl -fsSL "https://github.com/mozilla/geckodriver/releases/download/${GECKO_VER}/geckodriver-${GECKO_VER}-${GECKO_OS}.tar.gz" \
            | sudo tar xz -C /usr/local/bin geckodriver
          sudo chmod +x /usr/local/bin/geckodriver
          geckodriver --version | head -1

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install cross-browser Node dependencies
        run: cd scripts/cross-browser && npm install --no-audit --no-fund --omit=dev

      - name: Install Playwright Chromium
        run: cd scripts/cross-browser && npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        # Firefox runs through the Linux Docker image built from
        # `scripts/cross-browser/Dockerfile`. Buildx makes the build
        # cache-friendly with the layer-restoration step below.
        uses: docker/setup-buildx-action@v3

      - name: Build cross-browser Docker image (Firefox CLI)
        run: cd scripts/cross-browser && docker build -t phpdftk/cross-browser:ci .

      - name: Hash curated manifest for cache key
        id: manifest-hash
        run: |
          HASH=$(sha256sum packages/wpt-harness/curated/manifest.json | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore browser-cache PDFs
        uses: actions/cache@v4
        with:
          path: var/wpt/browser-cache
          key: cross-browser-cache-${{ env.CACHE_GENERATION }}-${{ steps.manifest-hash.outputs.hash }}-shard-${{ matrix.shard }}
          # Shards each restore their own slice (key suffixed with the
          # shard number); the cross-shard fallback below lets a new
          # shard layout pick up cached entries from a previous run.
          restore-keys: |
            cross-browser-cache-${{ env.CACHE_GENERATION }}-${{ steps.manifest-hash.outputs.hash }}-
            cross-browser-cache-${{ env.CACHE_GENERATION }}-

      - name: Run cross-browser oracle (shard ${{ matrix.shard }})
        env:
          # Strip WebKit on Linux — the Swift wrapper isn't built here.
          # The ConsensusScorer rule collapses to "two engines must agree".
          PHPDFTK_CROSS_BROWSER_ENGINES: chromium,firefox
        run: |
          mkdir -p artifacts
          # Translate the dispatch input (filter / shard count) into
          # CLI flags. Defaults to "all curated, 4 shards".
          FILTER='${{ github.event.inputs.filter }}'
          TOTAL='${{ github.event.inputs.shards }}'
          TOTAL="${TOTAL:-4}"
          FILTER_ARG=""
          if [ -n "$FILTER" ]; then
            FILTER_ARG="--filter=$FILTER"
          fi
          # Surface the run continuing on test failures so a single
          # regression doesn't kill the aggregator job.
          set +e
          packages/wpt-harness/bin/wpt cross-browser \
            $FILTER_ARG \
            --shard=${{ matrix.shard }}/$TOTAL \
            --json=artifacts/result.json
          status=$?
          set -e
          echo "shard exit status: $status"
          # The aggregator handles fail tallies; we only fail the
          # shard job on a hard crash (no JSON produced).
          if [ ! -s artifacts/result.json ]; then
            echo "::error::shard ${{ matrix.shard }} produced no result.json"
            exit 1
          fi

      - name: Upload shard result
        uses: actions/upload-artifact@v7
        with:
          name: cross-browser-shard-${{ matrix.shard }}
          path: artifacts/result.json

  aggregate:
    needs: shard
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Download every shard's result
        uses: actions/download-artifact@v4
        with:
          path: shard-artifacts
          pattern: cross-browser-shard-*

      - name: Aggregate shard results
        run: |
          # Each artefact lands at shard-artifacts/cross-browser-shard-K/result.json.
          php scripts/cross-browser/aggregate.php \
            shard-artifacts/cross-browser-shard-*/result.json \
            --commit-sha=${{ github.sha }} \
            --pr-number=${{ github.event.pull_request.number }} \
            --repo=${{ github.repository }} \
            --top-fails=10 \
            --verdict-output=verdict.json \
            > comment.md
          echo "----- BEGIN COMMENT BODY -----"
          cat comment.md
          echo "----- END COMMENT BODY -----"
          echo "----- VERDICT -----"
          cat verdict.json

      - name: Upload aggregated report
        uses: actions/upload-artifact@v7
        with:
          name: cross-browser-report
          path: |
            comment.md
            verdict.json

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- cross-browser-oracle -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
