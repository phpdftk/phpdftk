name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        run: cd docs/site && npm ci

      - name: Generate versions.json
        run: node docs/site/scripts/generate-versions.js > docs/site/public/versions.json

      - name: Build site
        run: cd docs/site && npx astro build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
