name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zlib, openssl, simplexml
          coverage: pcov

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate coverage report
        run: |
          mkdir -p build/coverage
          php -d memory_limit=512M vendor/bin/phpunit \
            --exclude-group tier2 --exclude-group tier4 --exclude-group verapdf \
            --coverage-clover build/coverage/clover.xml \
            --coverage-html build/coverage/html

      - name: Copy coverage to docs site
        run: cp -r build/coverage/html docs/site/public/coverage

      - name: Install phpDocumentor
        run: |
          curl -sSL https://github.com/phpDocumentor/phpDocumentor/releases/download/v3.9.1/phpDocumentor.phar -o phpDocumentor.phar
          chmod +x phpDocumentor.phar
          sudo mv phpDocumentor.phar /usr/local/bin/phpdoc

      - name: Generate API docs
        run: phpdoc run

      - name: Copy API docs to docs site
        run: cp -r build/phpdoc docs/site/public/api

      - name: Install site dependencies
        run: cd docs/site && npm ci

      - name: Generate versions.json
        run: node docs/site/scripts/generate-versions.js > docs/site/public/versions.json

      - name: Build site
        run: cd docs/site && npx astro build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
