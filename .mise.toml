[plugins]
php = "https://github.com/verzly/mise-php"

[tools]
php = "8.4"
node = "24"

[tasks.test]
description = "Run tests"
run = "composer test"

[tasks.analyse]
description = "Run PHPStan static analysis"
run = "composer analyse"

[tasks.lint]
description = "Check code style (PHP CS Fixer dry-run)"
run = "composer lint"

[tasks."lint:fix"]
description = "Fix code style"
run = "composer lint:fix"

[tasks.benchmark]
description = "Run benchmarks and generate docs/generated/benchmarks.md"
run = "composer benchmark"

[tasks.coverage]
description = "Generate code coverage report and badge"
run = "composer coverage"

[tasks.compliance]
description = "Run external compliance validation suite"
run = "composer compliance"

[tasks.phpdoc]
description = "Generate API documentation via phpDocumentor"
run = "composer phpdoc"
