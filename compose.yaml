# Container-hosted cross-browser sweep.
#
# Brings up one persistent engine daemon per browser, all sharing the
# WPT corpus (read-only) and the sha256-keyed PDF cache (read-write).
# The PHP sweep (`wpt cb-sweep --daemon-base=http://127.0.0.1:910`)
# talks to these daemons over loopback HTTP instead of forking a fresh
# `node render.mjs` per fixture.
#
# All three engines: chromium (P0/#31), firefox (P1/#32), webkit (P2/#33).
#
# Reference: docs/plans/cross-browser-container-sweep.md
#
# Common operations:
#
#   docker compose up -d --wait chromium
#   curl http://127.0.0.1:9101/status
#   docker compose down
#
# The fonts mount is optional — if vendor-data/fonts/ doesn't exist
# the engine falls back to the host system fonts that ship in the
# Playwright base image. Once we settle the font-pinning question
# (open in the plan, deferred to Phase P3) this will become required.

services:
  chromium:
    build:
      context: ./scripts/cross-browser/engines/chromium
    image: phpdftk/chromium-daemon:dev
    container_name: phpdftk-chromium-daemon
    ports:
      - "127.0.0.1:9101:9101"
    volumes:
      - ./vendor-data/wpt:/wpt:ro
      - ./var/wpt/browser-cache:/var/cache/browser
    environment:
      PORT: "9101"
      WPT_ROOT: /wpt
      CACHE_DIR: /var/cache/browser
      # POOL_SIZE — leave unset to let the daemon pick min(cores−2, 16)
      # based on the container's reported parallelism. Override for
      # local dev or CI matrix shards that want a different cap.
    init: true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9101/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  firefox:
    build:
      context: ./scripts/cross-browser/engines/firefox
    image: phpdftk/firefox-daemon:dev
    container_name: phpdftk-firefox-daemon
    ports:
      - "127.0.0.1:9102:9102"
    volumes:
      - ./vendor-data/wpt:/wpt:ro
      - ./var/wpt/browser-cache:/var/cache/browser
    environment:
      PORT: "9102"
      WPT_ROOT: /wpt
      CACHE_DIR: /var/cache/browser
      # POOL_SIZE — leave unset to let the daemon pick min(cores−2, 16).
      # FIREFOX_BIN / GECKODRIVER_BIN — Mozilla tarball + release binary
      # are installed at /usr/local/bin/firefox-cli + /usr/local/bin/
      # geckodriver in the Dockerfile; the daemon defaults to those.
    init: true
    healthcheck:
      # Geckodriver's initial session bring-up takes ~4-6 s on first
      # boot (Firefox profile creation, GFX bring-up). The 60 s
      # start_period covers it; once warm the daemon answers /status
      # in milliseconds.
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9102/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  webkit:
    build:
      context: ./scripts/cross-browser/engines/webkit
    image: phpdftk/webkit-daemon:dev
    container_name: phpdftk-webkit-daemon
    ports:
      - "127.0.0.1:9103:9103"
    volumes:
      - ./vendor-data/wpt:/wpt:ro
      - ./var/wpt/browser-cache:/var/cache/browser
    environment:
      PORT: "9103"
      WPT_ROOT: /wpt
      CACHE_DIR: /var/cache/browser
      # POOL_SIZE — current v1 daemon serialises renders behind a
      # single WebKitWebView (multi-view pool deferred). Leave unset
      # to use the default; override for diagnostics.
    init: true
    healthcheck:
      # WebKit + xvfb bring-up is slower than Chromium (the X server
      # has to start) but faster than Firefox (no geckodriver session
      # creation). 45 s start_period covers cold-boot comfortably.
      # The healthcheck runs in-container Python rather than node
      # (no node in this image) — urllib is stdlib so no extra deps.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9103/status', timeout=2).status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
