<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.5" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5" fx="0.4" fy="0.4" fr="0.05">
      <stop offset="0" stop-color="white"/>
      <stop offset="0.6" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
    <linearGradient id="trans" x1="0" y1="0" x2="1" y2="0"
                    gradientTransform="rotate(45)">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="300" height="120" fill="url(#sunset)"/>
  <circle cx="220" cy="40" r="25" fill="url(#sun)"/>
  <rect x="0" y="120" width="300" height="80" fill="url(#trans)"/>
</svg>
