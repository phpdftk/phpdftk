<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="white"/>
      <stop offset="0.6" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <symbol id="tree" viewBox="0 0 20 30">
      <rect x="9" y="20" width="2" height="10" fill="#7c2d12"/>
      <circle cx="10" cy="15" r="8" fill="#16a34a"/>
    </symbol>
    <clipPath id="ground-clip">
      <rect x="0" y="200" width="400" height="100"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>

  <!-- Sun with glow -->
  <circle cx="320" cy="60" r="30" fill="url(#sun)"/>

  <!-- Mountain silhouette via path grammar -->
  <path d="M 0 200 L 80 100 Q 110 80 140 100 L 200 60 L 260 110 L 320 90 L 400 130 L 400 200 Z"
        fill="#4338ca"/>

  <!-- River with smooth curves -->
  <path d="M 0 220 C 80 210 120 240 200 220 S 280 210 400 230 L 400 250 L 0 250 Z"
        fill="#1d4ed8" clip-path="url(#ground-clip)"/>

  <!-- A row of trees via use+symbol -->
  <use href="#tree" x="20" y="170"/>
  <use href="#tree" x="60" y="170"/>
  <use href="#tree" x="100" y="170"/>
  <use href="#tree" x="280" y="170"/>
  <use href="#tree" x="320" y="170"/>
  <use href="#tree" x="360" y="170"/>

  <!-- Caption -->
  <text x="200" y="285" font-size="14" font-family="serif" font-style="italic"
        fill="#1f2937" text-anchor="middle">A combined-feature test scene</text>
</svg>
