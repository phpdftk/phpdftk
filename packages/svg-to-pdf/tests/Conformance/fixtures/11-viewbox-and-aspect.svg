<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 200 100"
     preserveAspectRatio="xMidYMid meet">
  <!-- Origin shifted via viewBox; the content is centred about (50, 0) -->
