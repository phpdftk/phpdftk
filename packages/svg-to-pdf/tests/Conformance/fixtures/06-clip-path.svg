<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <clipPath id="circle-clip" clipPathUnits="userSpaceOnUse">
      <circle cx="75" cy="100" r="60"/>
    </clipPath>
    <clipPath id="bbox-clip" clipPathUnits="objectBoundingBox">
      <rect x="0.1" y="0.1" width="0.8" height="0.8"/>
    </clipPath>
    <clipPath id="transformed-clip" clipPathUnits="userSpaceOnUse" transform="rotate(15, 220, 100)">
      <rect x="170" y="50" width="100" height="100"/>
    </clipPath>
  </defs>
  <!-- userSpaceOnUse clip -->
  <rect x="15" y="40" width="120" height="120" fill="#3b82f6"
        clip-path="url(#circle-clip)"/>
  <!-- objectBoundingBox clip -->
  <rect x="150" y="40" width="60" height="120" fill="#10b981"
        clip-path="url(#bbox-clip)"/>
  <!-- transform-on-clipPath -->
  <rect x="170" y="50" width="100" height="100" fill="#f59e0b"
        clip-path="url(#transformed-clip)"/>
</svg>
