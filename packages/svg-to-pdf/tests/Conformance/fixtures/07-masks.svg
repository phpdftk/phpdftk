<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <mask id="lum-mask" maskContentUnits="userSpaceOnUse">
      <!-- Black backdrop hides, white painted region shows -->
      <rect width="300" height="200" fill="black"/>
      <circle cx="75" cy="100" r="50" fill="white"/>
      <circle cx="225" cy="100" r="50" fill="white"/>
    </mask>
    <mask id="alpha-mask" mask-type="alpha" maskContentUnits="userSpaceOnUse">
      <rect x="20" y="120" width="100" height="60" fill="black" opacity="1"/>
      <rect x="50" y="130" width="40" height="40" fill="black" opacity="0.3"/>
    </mask>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Luminance mask: visible only where the mask painted white -->
  <rect width="300" height="100" fill="url(#bg)" mask="url(#lum-mask)"/>
  <!-- Alpha mask, mask-type=alpha -->
  <rect x="0" y="120" width="300" height="60" fill="#4338ca" mask="url(#alpha-mask)"/>
</svg>
