<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Three overlapping circles with varying opacity -->
  <circle cx="100" cy="100" r="60" fill="#ef4444" opacity="0.6"/>
  <circle cx="150" cy="100" r="60" fill="#3b82f6" opacity="0.6"/>
  <circle cx="125" cy="60" r="60" fill="#10b981" opacity="0.6"/>
  <!-- fill-opacity + stroke-opacity independent -->
  <rect x="200" y="20" width="80" height="80" fill="#a855f7" fill-opacity="0.3"
        stroke="black" stroke-width="3" stroke-opacity="0.8"/>
  <!-- Opacity on a group cascades through children -->
  <g opacity="0.5" transform="translate(200, 120)">
    <rect width="80" height="40" fill="#f59e0b"/>
    <rect x="20" y="20" width="60" height="40" fill="#0ea5e9"/>
  </g>
</svg>
