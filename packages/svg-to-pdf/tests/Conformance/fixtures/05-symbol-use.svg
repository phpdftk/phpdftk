<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <defs>
    <!-- A reusable star icon defined once and instantiated several times -->
    <symbol id="star" viewBox="0 0 20 20">
      <polygon points="10,1 12.5,7 19,7.5 14,12 15.5,19 10,15 4.5,19 6,12 1,7.5 7.5,7"
               fill="#facc15" stroke="#854d0e" stroke-width="0.5"/>
    </symbol>
    <symbol id="check" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="#10b981"/>
      <path d="M 6 12 L 10 16 L 18 8" stroke="white" stroke-width="2" fill="none"/>
    </symbol>
  </defs>
  <use href="#star" x="10" y="10"/>
  <use href="#star" x="40" y="10"/>
  <use href="#star" x="70" y="10"/>
  <use href="#check" x="110" y="10"/>
  <use href="#check" x="140" y="10"/>
  <use href="#check" x="170" y="10"/>
</svg>
